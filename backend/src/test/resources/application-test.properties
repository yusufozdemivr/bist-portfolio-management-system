spring.application.name=bist-portfolio-management

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver


spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=never

jwt.secret=test-secret-key-that-is-at-least-32-chars-long
jwt.expiration=86400000

# Stock Price Provider - Yahoo Finance
yahoo.finance.base-url=https://query1.finance.yahoo.com/v8/finance/chart

# Stock Price Provider - BigPara
bigpara.base-url=https://bigpara.hurriyet.com.tr/api/v1/borsa/hisseyuzeysel

# Scheduler Settings
scheduler.stock-price.request-delay-ms=0

# Disable scheduling in test profile
spring.task.scheduling.enabled=false